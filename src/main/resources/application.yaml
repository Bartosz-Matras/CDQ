spring:
  application:
    name: cdq
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/bank-transactions}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      resolve-lazily: true

import:
  chunk-size: 1000
  thread-pool:
    core-size: 2
    max-size: 4
    queue-capacity: 10

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator

